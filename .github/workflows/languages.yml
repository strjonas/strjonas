name: Languages
on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/gen_languages_svg.py
      - .github/workflows/languages.yml

permissions:
  contents: write

jobs:
  languages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Generate languages.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/gen_languages_svg.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet languages.svg; then
            git add languages.svg
            git commit -m "Refresh languages.svg"
            git push
          else
            echo "No changes."
          fi
